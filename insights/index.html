<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta -->
    <title>PWP Infra - Insights</title>
    <meta name="title" content="PWP Infra - Insights" />
    <meta
      name="description"
      content="Read insights and articles from PWP Infra on infrastructure expansion, market research, and business growth strategies."
    />
    <meta name="author" content="Sagar Gupta" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#ffffff" />

    <!-- Canonical -->
    <link rel="canonical" href="https://pwpinfra.com/insights/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://pwpinfra.com/insights/" />
    <meta property="og:title" content="PWP Infra - Insights" />
    <meta
      property="og:description"
      content="Read insights and articles from PWP Infra on infrastructure expansion, market research, and business growth strategies."
    />
    <meta
      property="og:image"
      content="/assets/favicon/web-app-manifest-512x512.png"
    />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://pwpinfra.com/insights/" />
    <meta property="twitter:title" content="PWP Infra - Insights" />
    <meta
      property="twitter:description"
      content="Read insights and articles from PWP Infra on infrastructure expansion, market research, and business growth strategies."
    />
    <meta
      property="twitter:image"
      content="/assets/favicon/web-app-manifest-512x512.png"
    />

    <!-- Performance: Preconnect -->
    <!-- Add preconnect links here when external fonts/CDNs are used -->

    <!-- Preload critical CSS -->
    <link rel="preload" href="/css/main.css?v=0.0.1" as="style" />

    <!-- CSS -->
    <link rel="stylesheet" href="/css/main.css?v=0.0.1" />
    <link rel="stylesheet" href="/css/header.css?v=0.0.1" />
    <link rel="stylesheet" href="/css/footer.css?v=0.0.1" />
    <link rel="stylesheet" href="/css/insights.css?v=0.0.1" />
    <link rel="stylesheet" href="/css/responsive.css?v=0.0.1" />

    <!-- Favicon -->
    <link rel="icon" href="/assets/favicon/favicon.ico" type="image/x-icon" />
    <link
      rel="icon"
      type="image/png"
      href="/assets/favicon/favicon-96x96.png"
      sizes="96x96"
    />
    <link rel="icon" type="image/svg+xml" href="/assets/favicon/favicon.svg" />
    <link rel="shortcut icon" href="/assets/favicon/favicon.ico" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/assets/favicon/apple-touch-icon.png"
    />
    <meta name="apple-mobile-web-app-title" content="PWP Infra - Insights" />

    <!-- Manifest (for PWA readiness) -->
    <link rel="manifest" href="/assets/favicon/site.webmanifest" />
  </head>

  <body>
    <!-- Header -->
    <site-header></site-header>

    <!-- Section -->
    <section class="InsightsFeatured" id="main-content"></section>

    <!-- Section -->
    <section class="InsightsBlog" id="insights-blog">
      <div class="InsightsFeatured-container">
        <h2 class="InsightsFeatured-headingWrapper">Our Blog</h2>

        <div class="InsightsFeatured-gridContainer" id="blogs-container"></div>
      </div>
    </section>

    <!-- Footer -->
    <site-footer class="SiteFooter"></site-footer>

    <!-- Scripts -->
    <script type="text/javascript" src="/js/utils.js?v=0.0.1"></script>
    <script>
      const renderInsights = async () => {
        const featuredContainer = document.getElementById("main-content");
        const maincontainer = document.getElementById("insights-blog");
        const blogsContainer = document.getElementById("blogs-container");

        const data = await fetchJSON("/constants/blogs.json");

        if (!data || data.length === 0) {
          featuredContainer.style.display = "none";
          maincontainer.style.display = "none";
          return;
        }

        // Render featured blog
        const featuredBlogs = data.filter((b) => b.isFeatured);

        if (featuredBlogs.length === 0) {
          featuredContainer.style.display = "none";
        } else {
          const featureBlog = featuredBlogs[0];

          const container = document.createElement("div");
          const h1 = document.createElement("h1");
          const blogMeta = document.createElement("div");
          const postedBy = document.createElement("span");
          const postedOn = document.createElement("span");
          const img = document.createElement("div");
          const description = document.createElement("p");
          const a = document.createElement("a");

          h1.classList.add("featured-title");
          h1.innerText = featureBlog.title;

          blogMeta.classList.add("InsightsFeatured-blogMeta");
          postedBy.innerText = featureBlog.postedBy;
          postedOn.innerText = `Posted on ${featureBlog.postedOn}`;
          blogMeta.appendChild(postedBy);
          blogMeta.appendChild(postedOn);

          img.classList.add("InsightsFeatured-blogImg");
          img.innerHTML = `<img src="/assets/blogs/${featureBlog.title}/thumbnail.png" alt="${featureBlog.title}" />`;

          a.classList.add("InsightsFeatured-readMore");
          a.href = `/insights/blog/?b=${featureBlog.title}`;
          a.innerText = "Read More";

          container.appendChild(h1);
          container.appendChild(blogMeta);
          container.appendChild(img);

          const currentBlocks = featureBlog?.blocks;

          if (currentBlocks && currentBlocks.length > 0) {
            description.classList.add("InsightsFeatured-description");
            description.innerText = currentBlocks[0].description;
            container.appendChild(description);
          }

          container.appendChild(a);
          featuredContainer.appendChild(container);
        }

        // Render blog list
        data.forEach((blog) => {
          const card = document.createElement("div");
          const img = document.createElement("div");
          const date = document.createElement("div");
          const h3 = document.createElement("h3");
          const link = document.createElement("a");

          card.classList.add("InsightsFeatured-card");
          img.classList.add("InsightsFeatured-cardImg");
          img.innerHTML = `<img src="/assets/blogs/${blog.title}/${blog.thumbnail}" alt="${blog.title}" />`;

          date.innerText = blog.postedOn;
          date.classList.add("InsightsFeatured-date");

          h3.innerText = blog.title;

          card.appendChild(img);
          card.appendChild(date);
          card.appendChild(h3);

          const blocks = blog?.blocks;

          if (blocks && blocks.length > 0) {
            const p = document.createElement("p");
            p.innerText = blocks[0].description;

            card.appendChild(p);
          }

          link.href = `/insights/blog/?b=${blog.title}`;
          link.innerText = "Read More →";

          card.appendChild(link);
          blogsContainer.appendChild(card);
        });
      };

      renderInsights();
    </script>

    <!-- Defer JS -->
    <script type="text/javascript" src="/js/header.js?v=0.0.1" defer></script>
    <script type="text/javascript" src="/js/footer.js?v=0.0.1" defer></script>
  </body>
</html>
