<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta -->
    <title>PWP Infra</title>
    <meta name="title" content="PWP Infra" />
    <meta
      name="description"
      content="PWP is a strategic infrastructure consulting firm delivering scalable, execution-focused solutions that drive long-term growth and operational excellence."
    />
    <meta name="author" content="Sagar Gupta" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#ffffff" />

    <!-- Canonical -->
    <link rel="canonical" href="https://pwpinfra.com/projects/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://pwpinfra.com/projects/" />
    <meta property="og:title" content="PWP Infra" />
    <meta
      property="og:description"
      content="PWP is a strategic infrastructure consulting firm delivering scalable, execution-focused solutions that drive long-term growth and operational excellence."
    />
    <meta
      property="og:image"
      content="/assets/favicon/web-app-manifest-512x512.png"
    />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://pwpinfra.com/projects/" />
    <meta property="twitter:title" content="PWP Infra" />
    <meta
      property="twitter:description"
      content="PWP is a strategic infrastructure consulting firm delivering scalable, execution-focused solutions that drive long-term growth and operational excellence."
    />
    <meta
      property="twitter:image"
      content="/assets/favicon/web-app-manifest-512x512.png"
    />

    <!-- Performance: Preconnect -->
    <!-- Add preconnect links here when external fonts/CDNs are used -->

    <!-- Preload critical CSS -->
    <link rel="preload" href="/css/main.css?v=0.0.1" as="style" />

    <!-- CSS -->
    <link rel="stylesheet" href="/css/main.css?v=0.0.1" />
    <link rel="stylesheet" href="/css/header.css?v=0.0.1" />
    <link rel="stylesheet" href="/css/footer.css?v=0.0.1" />
    <link rel="stylesheet" href="/css/singleton-project.css?v=0.0.1" />
    <link rel="stylesheet" href="/css/responsive.css?v=0.0.1" />

    <!-- Favicon -->
    <link rel="icon" href="/assets/favicon/favicon.ico" type="image/x-icon" />
    <link
      rel="icon"
      type="image/png"
      href="/assets/favicon/favicon-96x96.png"
      sizes="96x96"
    />
    <link rel="icon" type="image/svg+xml" href="/assets/favicon/favicon.svg" />
    <link rel="shortcut icon" href="/assets/favicon/favicon.ico" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/assets/favicon/apple-touch-icon.png"
    />
    <meta name="apple-mobile-web-app-title" content="PWP Infra" />

    <!-- Manifest (for PWA readiness) -->
    <link rel="manifest" href="/assets/favicon/site.webmanifest" />
  </head>

  <body>
    <!-- Header -->
    <site-header></site-header>

    <!-- Section -->
    <section class="SingletonProject" id="main-content">
      <div class="SingletonProject-imageWrapper" id="thumbnail-container"></div>
      <div class="SingletonProject-detailsWrapper" id="blocks"></div>
      <div class="SingletonProject-extraImageWrapper" id="gallery"></div>
    </section>

    <!-- Footer -->
    <site-footer class="SiteFooter"></site-footer>

    <!-- Scripts -->
    <script type="text/javascript" src="/js/utils.js?v=0.0.1"></script>
    <script>
      const render = async (title) => {
        const thumbnailContainer = document.getElementById(
          "thumbnail-container",
        );
        const blockContainer = document.getElementById("blocks");
        const gallery = document.getElementById("gallery");

        if (!title) {
          const nodataTitle = document.createElement("h1");
          nodataTitle.classList.add("SingletonProject-noProject");
          nodataTitle.innerText = "No project found for this page!";
          blockContainer.appendChild(nodataTitle);
          return;
        }

        // Head content
        const pageUrl = `https://pwpinfra.com/projects/${encodeURIComponent(title)}`;
        const fullTitle = `PWP Infra - ${title}`;

        document.title = fullTitle;

        updateMeta("title", fullTitle);
        updateMeta("og:title", fullTitle, true);
        updateMeta("og:url", pageUrl, true);
        updateMeta("twitter:title", fullTitle, true);
        updateMeta("twitter:url", pageUrl, true);

        let canonical = document.querySelector("link[rel='canonical']");
        if (!canonical) {
          canonical = document.createElement("link");
          canonical.setAttribute("rel", "canonical");
          document.head.appendChild(canonical);
        }
        canonical.setAttribute("href", pageUrl);

        // Body content
        const data = await fetchJSON("/constants/projects.json");

        if (!data) {
          const nodataTitle = document.createElement("h1");
          nodataTitle.classList.add("SingletonProject-noProject");
          nodataTitle.innerText = "Failed to load project data.";
          blockContainer.appendChild(nodataTitle);
          return;
        }

        const target = data.find((p) => p.title === title);

        if (!target) {
          const nodataTitle = document.createElement("h1");

          nodataTitle.classList.add("SingletonProject-noProject");
          nodataTitle.innerText = "No project found for this page!";
          blockContainer.appendChild(nodataTitle);
          thumbnailContainer.appendChild(blockContainer);

          return;
        }

        const thumbnail = target.thumbnail;
        const blocks = target.blocks;
        const images = target.images;

        if (!thumbnail) {
          const nodataTitle = document.createElement("h1");

          nodataTitle.classList.add("SingletonProject-noProject");
          nodataTitle.innerText = "No project found for this page!";
          blockContainer.appendChild(nodataTitle);
          thumbnailContainer.appendChild(blockContainer);

          return;
        }

        const image = document.createElement("img");
        image.src = `/assets/projects/${title}/${thumbnail}`;
        image.alt = title;
        thumbnailContainer.appendChild(image);

        if (!blocks || blocks.length === 0) {
          return;
        }

        blocks.forEach((b) => {
          const singleBlockContainer = document.createElement("div");
          const primaryTitle = document.createElement("h2");
          const primaryDescription = document.createElement("p");

          singleBlockContainer.classList.add("SingletonProject-block");
          primaryTitle.innerText = b.title;
          primaryDescription.innerText = b.description;

          singleBlockContainer.appendChild(primaryTitle);
          singleBlockContainer.appendChild(primaryDescription);
          blockContainer.appendChild(singleBlockContainer);
        });

        if (!images || images.length === 0) {
          return;
        }

        gallery.innerHTML = images
          .map((img) => {
            return `
                    <img src="/assets/projects/${title}/${img}" alt="${title}" loading="lazy" />
                  `;
          })
          .join("");
      };

      const params = new URLSearchParams(window.location.search);
      const title = params.get("p");

      render(title);
    </script>

    <!-- Defer JS -->
    <script type="text/javascript" src="/js/header.js?v=0.0.1" defer></script>
    <script type="text/javascript" src="/js/footer.js?v=0.0.1" defer></script>
  </body>
</html>
